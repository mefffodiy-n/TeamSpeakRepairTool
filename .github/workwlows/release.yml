name: Release TSRepairTool

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish portable EXE
        run: >
          dotnet publish .\TSRepairTool\TSRepairTool.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          -o .\publish

      - name: Zip release
        run: Compress-Archive -Path .\publish\* -DestinationPath .\TSRepairTool-win-x64.zip
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: .\TSRepairTool-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}