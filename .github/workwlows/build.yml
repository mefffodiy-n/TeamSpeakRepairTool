name: Build TSRepairTool

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\TSRepairTool\TSRepairTool.csproj

      - name: Publish portable EXE
        run: >
          dotnet publish .\TSRepairTool\TSRepairTool.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          -o .\publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TSRepairTool-win-x64
          path: .\publish\*